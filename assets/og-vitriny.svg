<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">VitrinY Etsy Brand Systems</title>
  <desc id="desc">Open graph image for VitrinY Etsy brand websites, visual systems, and safe Etsy checkout flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0B15"/>
      <stop offset="0.55" stop-color="#12121A"/>
      <stop offset="1" stop-color="#0B0B15"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00DC82"/>
      <stop offset="0.55" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="34" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="125" cy="110" r="160" fill="#7B61FF" opacity="0.22" filter="url(#glow)"/>
  <circle cx="1070" cy="520" r="190" fill="#00DC82" opacity="0.16" filter="url(#glow)"/>
  <rect x="82" y="72" width="1036" height="486" rx="42" fill="rgba(255,255,255,0.045)" stroke="rgba(255,255,255,0.16)"/>
  <text x="120" y="150" fill="#A7A7B3" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="8">VITRINY</text>
  <text x="120" y="260" fill="#F4F3EF" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="800">Etsy Brand Systems</text>
  <text x="120" y="345" fill="url(#accent)" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800">Websites + Visuals + Safe Checkout Flow</text>
  <text x="120" y="420" fill="#CFCFD8" font-family="Arial, Helvetica, sans-serif" font-size="30">For Etsy sellers who need stronger brand trust, better product presentation, and external traffic landing pages.</text>
  <g transform="translate(120 478)">
    <rect width="250" height="52" rx="26" fill="#FFFFFF"/>
    <text x="28" y="35" fill="#0B0B15" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">Fashion Lookbook</text>
    <rect x="270" width="250" height="52" rx="26" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
    <text x="298" y="35" fill="#F4F3EF" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">Jewelry Gift Story</text>
    <rect x="540" width="250" height="52" rx="26" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
    <text x="568" y="35" fill="#F4F3EF" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">Home Interior</text>
  </g>
</svg>
